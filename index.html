<link rel="stylesheet" href="css/style.css?v=3">

<body>

<img src="images/watercolor-sun-header.svg" alt="" class="banner">

<div class="container">

  </div>

  <div class="category-nav">
    <a class="active" data-filter="all">全部</a>
    <a data-filter="memory">記憶書寫</a>
    <a data-filter="drama">觀劇筆記</a>
    <a data-filter="essay">個人隨筆</a>

</div>

<script>
  document.querySelectorAll('.category-nav a').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.category-nav a').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const filter = tab.dataset.filter;
      document.querySelectorAll('.section').forEach(section => {
        if (filter === 'all' || section.dataset.category === filter) {
          section.classList.remove('hidden');
        } else {
          section.classList.add('hidden');
        }
      });
    });
  });
</script>
